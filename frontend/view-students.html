<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Students - Student Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <h1>Student Management System</h1>
        <ul class="nav-links">
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="view-students.html">View Students</a></li>
            <li><a href="add-student.html">Add Student</a></li>
        </ul>
    </nav>

    <div class="container">
        <h2>Student List</h2>
        
        <div class="search-bar mt-1">
            <input type="text" id="search-input" placeholder="Search by name...">
            <select id="sort-select">
                <option value="id-asc">Sort by ID (Asc)</option>
                <option value="id-desc">Sort by ID (Desc)</option>
                <option value="name-asc">Sort by Name (A-Z)</option>
                <option value="name-desc">Sort by Name (Z-A)</option>
            </select>
        </div>

        <div class="table-container">
            <table id="student-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Course</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="student-body">
                    <!-- Data will be loaded via JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        let allStudents = [];

        async function loadStudents() {
            try {
                allStudents = await fetchStudents();
                renderTable(allStudents);
            } catch (error) {
                console.error('Error loading students:', error);
            }
        }

        function renderTable(students) {
            const body = document.getElementById('student-body');
            body.innerHTML = '';
            students.forEach(s => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${s.id}</td>
                    <td>${s.name}</td>
                    <td>${s.email}</td>
                    <td>${s.phone}</td>
                    <td>${s.course}</td>
                    <td>
                        <button onclick="editStudent(${s.id})" class="btn btn-sm btn-primary">Edit</button>
                        <button onclick="confirmDelete(${s.id})" class="btn btn-sm btn-danger">Delete</button>
                    </td>
                `;
                body.appendChild(tr);
            });
        }

        function editStudent(id) {
            window.location.href = `edit-student.html?id=${id}`;
        }

        async function confirmDelete(id) {
            if (confirm('Are you sure you want to delete this student?')) {
                try {
                    await deleteStudent(id);
                    showToast('Student deleted successfully');
                    loadStudents();
                } catch (error) {
                    console.error('Error deleting student:', error);
                }
            }
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allStudents.filter(s => s.name.toLowerCase().includes(term));
            renderTable(filtered);
        });

        document.getElementById('sort-select').addEventListener('change', (e) => {
            const [criteria, order] = e.target.value.split('-');
            const sorted = [...allStudents].sort((a, b) => {
                let valA = a[criteria];
                let valB = b[criteria];
                if (typeof valA === 'string') {
                    valA = valA.toLowerCase();
                    valB = valB.toLowerCase();
                }
                if (order === 'asc') return valA > valB ? 1 : -1;
                return valA < valB ? 1 : -1;
            });
            renderTable(sorted);
        });

        document.addEventListener('DOMContentLoaded', loadStudents);
    </script>
</body>
</html>
