<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student - Student Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <h1>Student MS</h1>
        <ul class="nav-links">
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="view-students.html">View Students</a></li>
            <li><a href="add-student.html">Add Student</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="form-container">
            <h2 class="text-center mb-1">Edit Student</h2>
            <form id="edit-form">
                <input type="hidden" id="student-id">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter full name">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter email">
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="text" id="phone" placeholder="Enter 10-digit phone number">
                </div>
                <div class="form-group">
                    <label for="course">Course</label>
                    <input type="text" id="course" placeholder="Enter course name">
                </div>
                <div class="form-group">
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob">
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <div class="gender-group">
                        <label><input type="radio" name="gender" value="Male"> Male</label>
                        <label><input type="radio" name="gender" value="Female"> Female</label>
                        <label><input type="radio" name="gender" value="Other"> Other</label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="address">Address</label>
                    <textarea id="address" rows="3" placeholder="Enter address"></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-block" style="width: 100%;">Save Changes</button>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const studentId = urlParams.get('id');

        document.addEventListener('DOMContentLoaded', async () => {
            if (!studentId) {
                window.location.href = 'view-students.html';
                return;
            }

            try {
                const s = await fetchStudentById(studentId);
                document.getElementById('student-id').value = s.id;
                document.getElementById('name').value = s.name;
                document.getElementById('email').value = s.email;
                document.getElementById('phone').value = s.phone;
                document.getElementById('course').value = s.course;
                document.getElementById('dob').value = s.dob;
                document.querySelector(`input[name="gender"][value="${s.gender}"]`).checked = true;
                document.getElementById('address').value = s.address;
            } catch (error) {
                console.error('Error fetching student:', error);
                showToast('Failed to load student data', 'danger');
            }
        });

        document.getElementById('edit-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const student = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                course: document.getElementById('course').value,
                dob: document.getElementById('dob').value,
                gender: document.querySelector('input[name="gender"]:checked').value,
                address: document.getElementById('address').value
            };

            try {
                await updateStudent(studentId, student);
                showToast('Student updated successfully');
                window.location.href = 'view-students.html';
            } catch (error) {
                console.error('Error updating student:', error);
                showToast('Failed to update student', 'danger');
            }
        });
    </script>
</body>
</html>
