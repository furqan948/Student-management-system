<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student - Student Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar">
        <h1>Student MS</h1>
        <ul class="nav-links">
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="view-students.html">View Students</a></li>
            <li><a href="add-student.html">Add Student</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="form-container">
            <h2 class="text-center mb-1">Add New Student</h2>
            <form id="student-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter full name">
                    <div id="name-error" class="error-message">Name cannot be empty</div>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Enter email">
                    <div id="email-error" class="error-message">Enter a valid email</div>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="text" id="phone" placeholder="Enter 10-digit phone number">
                    <div id="phone-error" class="error-message">Phone must be 10 digits</div>
                </div>
                <div class="form-group">
                    <label for="course">Course</label>
                    <input type="text" id="course" placeholder="Enter course name">
                    <div id="course-error" class="error-message">Course cannot be empty</div>
                </div>
                <div class="form-group">
                    <label for="dob">Date of Birth</label>
                    <input type="date" id="dob">
                    <div id="dob-error" class="error-message">Date of birth must not be in future</div>
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <div class="gender-group">
                        <label><input type="radio" name="gender" value="Male" checked> Male</label>
                        <label><input type="radio" name="gender" value="Female"> Female</label>
                        <label><input type="radio" name="gender" value="Other"> Other</label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="address">Address</label>
                    <textarea id="address" rows="3" placeholder="Enter address"></textarea>
                </div>
                <button type="submit" class="btn btn-primary btn-block" style="width: 100%;">Add Student</button>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('student-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Validation
            let isValid = true;
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const course = document.getElementById('course').value;
            const dob = document.getElementById('dob').value;
            const gender = document.querySelector('input[name="gender"]:checked').value;
            const address = document.getElementById('address').value;

            // Reset errors
            document.querySelectorAll('.error-message').forEach(el => el.style.display = 'none');

            if (!name) { document.getElementById('name-error').style.display = 'block'; isValid = false; }
            if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { document.getElementById('email-error').style.display = 'block'; isValid = false; }
            if (!phone || !/^\d{10}$/.test(phone)) { document.getElementById('phone-error').style.display = 'block'; isValid = false; }
            if (!course) { document.getElementById('course-error').style.display = 'block'; isValid = false; }
            if (!dob || new Date(dob) > new Date()) { document.getElementById('dob-error').style.display = 'block'; isValid = false; }

            if (isValid) {
                const student = { name, email, phone, course, dob, gender, address };
                try {
                    await createStudent(student);
                    showToast('Student added successfully!');
                    setTimeout(() => {
                        window.location.href = 'view-students.html';
                    }, 500);
                } catch (error) {
                    console.error('Error adding student:', error);
                    showToast('Error: ' + error.message, 'danger');
                }
            }
        });
    </script>
</body>
</html>
